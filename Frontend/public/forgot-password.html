<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<link rel="stylesheet" href="../src/Styles/Styles.css">
<style>
.auth-box {
  max-width: 400px;
  margin: 50px auto;
  padding: 30px;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.12);
}

.auth-box h2 {
  color: #fc8019;
  margin-bottom: 10px;
  text-align: center;
}

.auth-box p {
  color: #555;
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 20px;
  text-align: center;
}

.auth-box input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  box-sizing: border-box;
}

.auth-box button {
  width: 100%;
  padding: 12px;
  background: #fc8019;
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 15px;
  transition: 0.2s;
}

.auth-box button:hover {
  background: #e56f12;
}

#message {
  text-align: center;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 15px;
  font-weight: 500;
  display: none;
}

#message.success {
  background: #d4edda;
  color: #155724;
  display: block;
}

#message.error {
  background: #f8d7da;
  color: #721c24;
  display: block;
}

.back-link {
  text-align: center;
  margin-top: 15px;
}

.back-link a {
  color: #fc8019;
  text-decoration: none;
  font-weight: 600;
}

.back-link a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="auth-box">

<h2>Reset Password</h2>

<p>Enter your email address and we'll send you a code to reset your password.</p>

<input id="email" type="email" placeholder="Enter your email address">

<button onclick="sendResetCode()">Send Code</button>

<p id="message"></p>

<div class="back-link">
<a href="login.html">Back to Login</a>
</div>

</div>

<script>
const API_BASE="http://localhost:5000";

async function sendResetCode(){
const email=document.getElementById("email").value.trim();
const messageEl=document.getElementById("message");

messageEl.className="";
messageEl.display="none";

if(!email){
messageEl.innerText="Please enter your email address.";
messageEl.className="error";
return;
}

// Basic email validation
const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
if(!emailRegex.test(email)){
messageEl.innerText="Please enter a valid email address.";
messageEl.className="error";
return;
}

try{
const response=await fetch(`${API_BASE}/api/auth/forgot-password`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email})
});

const result=await response.json();

if(!response.ok || !result.success){
throw new Error(result.error||"Failed to send reset code");
}

// Store email in sessionStorage for the next page
sessionStorage.setItem("resetEmail",email);

messageEl.innerText=`An email has been sent to ${email}. Please check your inbox for the verification code.`;
messageEl.className="success";

// Redirect to reset password page after 2 seconds
setTimeout(()=>{
window.location.href="reset-password.html";
},2000);
}
catch(error){
messageEl.innerText=error.message;
messageEl.className="error";
}
}

// Allow Enter key to submit
document.getElementById("email").addEventListener("keypress",function(event){
if(event.key==="Enter"){
sendResetCode();
}
});
</script>

</body>
</html>
