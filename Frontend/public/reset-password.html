<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>
<link rel="stylesheet" href="../src/Styles/Styles.css">
<style>
.auth-box {
  max-width: 400px;
  margin: 50px auto;
  padding: 30px;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.12);
}

.auth-box h2 {
  color: #fc8019;
  margin-bottom: 10px;
  text-align: center;
}

.auth-box p {
  color: #555;
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 20px;
  text-align: center;
}

.auth-box input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  box-sizing: border-box;
}

.auth-box button {
  width: 100%;
  padding: 12px;
  background: #fc8019;
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 15px;
  transition: 0.2s;
}

.auth-box button:hover {
  background: #e56f12;
}

#message {
  text-align: center;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 15px;
  font-weight: 500;
  display: none;
}

#message.success {
  background: #d4edda;
  color: #155724;
  display: block;
}

#message.error {
  background: #f8d7da;
  color: #721c24;
  display: block;
}

.back-link {
  text-align: center;
  margin-top: 15px;
}

.back-link a {
  color: #fc8019;
  text-decoration: none;
  font-weight: 600;
}

.back-link a:hover {
  text-decoration: underline;
}

.email-info {
  background: #fff2e5;
  color: #fc8019;
  padding: 12px;
  border-radius: 8px;
  text-align: center;
  margin-bottom: 20px;
  font-weight: 500;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="auth-box">

<h2>Enter Verification Code</h2>

<div class="email-info" id="emailInfo">
Check your email
</div>

<p>We sent a 6-digit code to your email. Enter it below along with your new password.</p>

<input id="code" type="text" placeholder="Enter 6-digit code" maxlength="6" inputmode="numeric">

<input id="newPassword" type="password" placeholder="Enter new password">

<input id="confirmPassword" type="password" placeholder="Confirm new password">

<button onclick="resetPassword()">Reset Password</button>

<p id="message"></p>

<div class="back-link">
<a href="login.html">Back to Login</a>
</div>

</div>

<script>
const API_BASE="http://localhost:5000";

// Get email from sessionStorage
const resetEmail=sessionStorage.getItem("resetEmail");

window.addEventListener("DOMContentLoaded",function(){
if(!resetEmail){
// If no email in sessionStorage, redirect back to forgot password
window.location.href="forgot-password.html";
return;
}

document.getElementById("emailInfo").innerText=`Code sent to: ${resetEmail}`;
});

// Only allow numbers in code field
document.getElementById("code").addEventListener("input",function(e){
this.value=this.value.replace(/[^0-9]/g,"");
});

async function resetPassword(){
const code=document.getElementById("code").value.trim();
const newPassword=document.getElementById("newPassword").value;
const confirmPassword=document.getElementById("confirmPassword").value;
const messageEl=document.getElementById("message");

messageEl.className="";
messageEl.display="none";

if(!code || !newPassword || !confirmPassword){
messageEl.innerText="Please fill all fields.";
messageEl.className="error";
return;
}

if(code.length!==6){
messageEl.innerText="Verification code must be 6 digits.";
messageEl.className="error";
return;
}

if(newPassword.length<6){
messageEl.innerText="Password must be at least 6 characters.";
messageEl.className="error";
return;
}

if(newPassword!==confirmPassword){
messageEl.innerText="Passwords do not match.";
messageEl.className="error";
return;
}

try{
const response=await fetch(`${API_BASE}/api/auth/reset-password`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:resetEmail,
code,
newPassword
})
});

const result=await response.json();

if(!response.ok || !result.success){
throw new Error(result.error||"Failed to reset password");
}

messageEl.innerText="Password reset successfully! Redirecting to login...";
messageEl.className="success";

// Clear sessionStorage
sessionStorage.removeItem("resetEmail");

setTimeout(()=>{
window.location.href="login.html";
},2000);
}
catch(error){
messageEl.innerText=error.message;
messageEl.className="error";
}
}

// Allow Enter key to submit
document.getElementById("confirmPassword").addEventListener("keypress",function(event){
if(event.key==="Enter"){
resetPassword();
}
});
</script>

</body>
</html>
