<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodie Orange Pro</title>

<style>
:root{
--primary:#fc8019;
--primary-dark:#e56f12;
--bg1:#fff4e6;
--bg2:#ffe8cc;
--dark:#222;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,var(--bg1),var(--bg2));
}

/* HEADER */
header{
position:sticky;
top:0;
background:linear-gradient(to right,#fc8019,#ff9f43);
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
z-index:1000;
}

.logo{
font-size:22px;
font-weight:bold;
}

.cart-icon{
position:relative;
cursor:pointer;
font-size:22px;
}
.nav-right{
display:flex;
align-items:center;
gap:12px;
}

.nav-btn{
background:#fff;
color:#fc8019;
border:none;
padding:6px 14px;
border-radius:6px;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

.nav-btn:hover{
background:#ffe2c7;
}

.profile-menu{
position:relative;
}

.profile-btn{
width:36px;
height:36px;
border-radius:50%;
border:none;
background:#fff;
color:#fc8019;
font-size:18px;
cursor:pointer;
}

.profile-dropdown{
display:none;
position:absolute;
right:0;
top:44px;
background:#fff;
border-radius:10px;
box-shadow:0 8px 24px rgba(0,0,0,0.16);
min-width:170px;
overflow:hidden;
z-index:1200;
}

.profile-dropdown.show{
display:block;
}

.profile-dropdown button{
display:block;
width:100%;
text-align:left;
padding:10px 12px;
border:none;
background:#fff;
color:#333;
cursor:pointer;
font-size:14px;
}

.profile-dropdown button:hover{
background:#fff2e5;
}

.badge{
position:absolute;
top:-8px;
right:-10px;
background:#fff;
color:#fc8019;
font-size:12px;
padding:2px 6px;
border-radius:50%;
font-weight:bold;
}

/* CONTROLS */
.controls{
padding:20px;
display:flex;
gap:15px;
flex-wrap:wrap;
}

.controls input, select{
padding:10px;
border-radius:10px;
border:1px solid #ffd0a6;
}

/* LAYOUT */
.container{
display:flex;
padding:20px;
gap:20px;
}

.food-grid{
flex:3;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:20px;
}

.card{
background:#fff;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
padding:20px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.discount{
background:#fc8019;
color:#fff;
padding:4px 10px;
border-radius:20px;
font-size:12px;
display:inline-block;
margin-bottom:8px;
}

.old-price{
text-decoration:line-through;
color:#888;
font-size:14px;
}

.new-price{
font-weight:bold;
color:#222;
}

.add-btn{
background:#fc8019;
color:#fff;
border:none;
padding:8px 15px;
border-radius:8px;
cursor:pointer;
margin-top:8px;
}

.add-btn:hover{
background:#e56f12;
}

.card-actions{
display:flex;
gap:8px;
margin-top:8px;
}

.remove-btn{
background:#fff;
color:#c0392b;
border:1px solid #f1b5ae;
padding:8px 15px;
border-radius:8px;
cursor:pointer;
}

.remove-btn:hover{
background:#fdecea;
}

/* CART */
.cart{
flex:1;
background:#fff;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,0.12);
padding:20px;
height:80vh;
overflow:auto;
position:sticky;
top:90px;
}

.summary{
border-top:1px solid #eee;
padding-top:10px;
margin-top:10px;
font-size:14px;
line-height:1.6;
}

.cart-row{
display:flex;
justify-content:space-between;
align-items:center;
gap:8px;
margin-bottom:10px;
}

.cart-item-name{
font-size:14px;
flex:1;
}

.cart-item-controls{
display:flex;
align-items:center;
gap:6px;
}

.qty-btn{
width:26px;
height:26px;
border-radius:6px;
border:1px solid #f0c7a5;
background:#fff7ef;
color:#b45510;
font-weight:700;
cursor:pointer;
}

.qty-btn:hover{
background:#ffe9d1;
}

.qty-label{
min-width:20px;
text-align:center;
font-weight:700;
color:#333;
}

.cart-item-total{
min-width:70px;
text-align:right;
font-weight:600;
}

.place-btn{
background:#fc8019;
color:#fff;
border:none;
width:100%;
padding:12px;
border-radius:10px;
margin-top:15px;
cursor:pointer;
font-weight:bold;
}

.place-btn:hover{
background:#e56f12;
}

/* MOBILE */
@media(max-width:768px){
.container{
flex-direction:column;
}
.cart{
position:fixed;
bottom:-100%;
left:0;
width:100%;
height:60%;
transition:0.4s;
border-radius:20px 20px 0 0;
z-index:999;
}
.cart.open{
bottom:0;
}
.nav-btn{
padding:5px 10px;
font-size:12px;
}
}
</style>
</head>
<body>

<header>

<div class="logo">Foodie Orange</div>

<div class="nav-right">

<button class="nav-btn" id="loginBtn" onclick="location.href='login.html'">Login</button>

<button class="nav-btn" id="signupBtn" onclick="location.href='signup.html'">Sign Up</button>

<div class="profile-menu" id="profileMenu" style="display:none;">
<button class="profile-btn" id="profileToggle" onclick="toggleProfileMenu(event)" title="Profile">👤</button>
<div class="profile-dropdown" id="profileDropdown">
<button onclick="location.href='profile.html'">View Profile</button>
<button onclick="location.href='my-receipts.html'">My Receipts</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<div class="cart-icon" onclick="toggleCart()">🛒
<span class="badge" id="count">0</span>
</div>

</div>

</header>

<div class="controls">
<input type="text" id="search" placeholder="Search food...">
<select id="category">
<option value="all">All Categories</option>
<option value="Indian">Indian</option>
<option value="Chinese">Chinese</option>
<option value="Italian">Italian</option>
<option value="FastFood">Fast Food</option>
<option value="Dessert">Dessert</option>
<option value="Beverage">Beverage</option>
</select>
</div>

<div class="container">
<div class="food-grid" id="food"></div>

<div class="cart" id="cart">
<h2>Billing Summary</h2>
<div id="cartItems"></div>
<div class="summary" id="summary"></div>
<button class="place-btn" onclick="placeOrder()">Place Order</button>
</div>
</div>

<script>
const API_BASE="http://localhost:5000";
let foods=[];

function dedupeFoods(rawFoods){
const seen=new Set();

return rawFoods.filter(food=>{
const name=String(food.name||"").trim().toLowerCase();
const category=String(food.category||"").trim().toLowerCase();
const key=`${name}::${category}`;

if(seen.has(key)) return false;
seen.add(key);
return true;
});
}

/* CART */
let cart=JSON.parse(localStorage.getItem("cart"))||{};

async function loadFoods(){
try{
let response=await fetch(`${API_BASE}/api/foods`);
if(!response.ok){
throw new Error("Failed to fetch menu");
}

let payload=await response.json();
const apiFoods=Array.isArray(payload.data)?payload.data:[];
foods=dedupeFoods(apiFoods);
renderFoods();
}
catch(error){
document.getElementById("food").innerHTML=`
<div class="card" style="grid-column:1/-1;">
<h4>Unable to load menu</h4>
<p>Please ensure backend server is running on port 5000.</p>
</div>`;
console.error("Menu load error:",error);
}
}

function renderFoods(){
let grid=document.getElementById("food");
grid.innerHTML="";
let search=document.getElementById("search").value.toLowerCase();
let cat=document.getElementById("category").value;

foods.filter(f=>{
return f.name.toLowerCase().includes(search) &&
(cat=="all" || f.category==cat);
}).forEach(food=>{
let discount=Number(food.discount)||0;
let price=Number(food.price)||0;
let finalPrice=Math.floor(price-(price*discount/100));
let qtyInCart=cart[food.id]?cart[food.id].qty:0;
grid.innerHTML+=`
<div class="card">
<div class="discount">${discount}% OFF</div>
<h4>${food.name}</h4>
<div class="old-price">₹${price}</div>
<div class="new-price">₹${finalPrice}</div>
${qtyInCart>0?`<div style="font-size:12px;color:#666;">In cart: ${qtyInCart}</div>`:""}
<div class="card-actions">
<button class="add-btn" onclick="addToCart(${food.id})">Add</button>
${qtyInCart>0?`<button class="remove-btn" onclick="removeFromCart(${food.id})">Remove</button>`:""}
</div>
</div>`;
});

if(grid.innerHTML===""){
grid.innerHTML=`
<div class="card" style="grid-column:1/-1;">
<h4>No items found</h4>
<p>Try changing search text or category filter.</p>
</div>`;
}
}

function addToCart(id){
let item=foods.find(f=>f.id==id);
let finalPrice=Math.floor(item.price-(item.price*item.discount/100));

if(cart[id]) cart[id].qty++;
else cart[id]={...item,finalPrice:finalPrice,qty:1};

saveCart();
renderCart();
renderFoods();
}

function removeFromCart(id){
if(!cart[id]) return;

cart[id].qty--;
if(cart[id].qty<=0){
delete cart[id];
}

saveCart();
renderCart();
renderFoods();
}

function renderCart(){
let div=document.getElementById("cartItems");
div.innerHTML="";
let subtotal=0;
let originalTotal=0;
let totalQty=0;

Object.values(cart).forEach(item=>{
let original=item.price*item.qty;
let discounted=item.finalPrice*item.qty;

originalTotal+=original;
subtotal+=discounted;
totalQty+=item.qty;

div.innerHTML+=`
<div class="cart-row">
<span class="cart-item-name">${item.name}</span>
<div class="cart-item-controls">
<button class="qty-btn" onclick="removeFromCart(${item.id})">-</button>
<span class="qty-label">${item.qty}</span>
<button class="qty-btn" onclick="addToCart(${item.id})">+</button>
</div>
<span class="cart-item-total">₹${discounted}</span>
</div>`;
});

let discountSaved=originalTotal-subtotal;
let delivery=50;
let tax=subtotal*0.05;
let total=subtotal+delivery+tax;

document.getElementById("summary").innerHTML=`
Subtotal: ₹${subtotal.toFixed(2)}<br>
Discount Saved: ₹${discountSaved.toFixed(2)}<br>
Delivery: ₹${delivery}<br>
GST (5%): ₹${tax.toFixed(2)}<br>
<hr>
<b>Grand Total: ₹${total.toFixed(2)}</b>
`;

document.getElementById("count").innerText=totalQty;
}

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
}

function placeOrder(){
placeOrderAsync();
}

function getAuthToken(){
return localStorage.getItem("authToken")||"";
}

function getAuthUser(){
try{
return JSON.parse(localStorage.getItem("authUser")||"{}");
}
catch(error){
return {};
}
}

function isUserLoggedIn(){
const token=getAuthToken();
if(!token || token==="null" || token==="undefined") return false;
return true;
}

function redirectToLogin(){
const nextUrl=encodeURIComponent("index.html");
window.location.href=`login.html?returnUrl=${nextUrl}`;
}

function initAuthNav(){
const loginBtn=document.getElementById("loginBtn");
const signupBtn=document.getElementById("signupBtn");
const profileMenu=document.getElementById("profileMenu");
const profileToggle=document.getElementById("profileToggle");

if(!loginBtn || !signupBtn || !profileMenu || !profileToggle){
return;
}

if(isUserLoggedIn()){
const authUser=getAuthUser();
const username=(authUser.username||"").trim();
profileToggle.innerText=username?username.charAt(0).toUpperCase():"👤";
profileToggle.title=username?`Profile - ${username}`:"Profile";
loginBtn.style.display="none";
signupBtn.style.display="none";
profileMenu.style.display="block";
}
else{
profileToggle.innerText="👤";
profileToggle.title="Profile";
loginBtn.style.display="inline-block";
signupBtn.style.display="inline-block";
profileMenu.style.display="none";
}
}

function toggleProfileMenu(event){
event.stopPropagation();
document.getElementById("profileDropdown").classList.toggle("show");
}

function closeProfileMenu(){
document.getElementById("profileDropdown").classList.remove("show");
}

function logout(){
localStorage.removeItem("authToken");
localStorage.removeItem("authUser");
closeProfileMenu();
initAuthNav();
alert("You have been logged out.");
}

function collectCustomerDetails(){
let savedCustomer={};

try{
savedCustomer=JSON.parse(localStorage.getItem("customerProfile")||"{}");
}
catch(error){
savedCustomer={};
}

const customerName=prompt("Enter your name:",savedCustomer.customerName||"");
if(customerName===null || customerName.trim()==="") return null;

const customerPhone=prompt("Enter your phone number:",savedCustomer.customerPhone||"");
if(customerPhone===null || customerPhone.trim()==="") return null;

const deliveryAddress=prompt("Enter delivery address:",savedCustomer.deliveryAddress||"");
if(deliveryAddress===null || deliveryAddress.trim()==="") return null;

const customerDetails={
customerName:customerName.trim(),
customerPhone:customerPhone.trim(),
deliveryAddress:deliveryAddress.trim()
};

localStorage.setItem("customerProfile",JSON.stringify(customerDetails));
return customerDetails;
}

async function placeOrderAsync(){
if(Object.keys(cart).length===0){
alert("Your cart is empty!");
return;
}

if(!isUserLoggedIn()){
alert("Please login first to place your order.");
redirectToLogin();
return;
}

const customerDetails=collectCustomerDetails();
if(!customerDetails){
alert("Name, phone, and delivery address are required to place an order.");
return;
}

let items=Object.values(cart).map(item=>(
{
id:item.id,
name:item.name,
qty:item.qty,
price:item.finalPrice
}
));

let subtotal=items.reduce((sum,item)=>sum+(item.price*item.qty),0);
let delivery=50;
let tax=subtotal*0.05;
let grand=subtotal+delivery+tax;

try{
let response=await fetch(`${API_BASE}/api/orders`,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":`Bearer ${getAuthToken()}`
},
body:JSON.stringify({
items,
subtotal,
delivery,
tax,
grandTotal:grand,
customerName:customerDetails.customerName,
customerPhone:customerDetails.customerPhone,
deliveryAddress:customerDetails.deliveryAddress
})
});

let result=await response.json();
if(response.status===401){
alert("Your session has expired. Please login again.");
redirectToLogin();
return;
}

if(!response.ok || !result.success){
throw new Error(result.error||"Order request failed");
}

let orderSummary={
orderId:result.orderId,
receiptNumber:result.receiptNumber||null,
items,
subtotal,
delivery,
tax,
grandTotal:grand,
customerName:customerDetails.customerName,
customerPhone:customerDetails.customerPhone,
deliveryAddress:customerDetails.deliveryAddress,
createdAt:new Date().toISOString()
};

localStorage.setItem("lastOrder",JSON.stringify(orderSummary));
alert(`Order placed successfully! Order ID: ${result.orderId}\nReceipt: ${result.receiptNumber||"Generated"}`);

cart={};
saveCart();
renderCart();

window.location.href="receipt.html";
}
catch(error){
alert("Unable to place order. Please try again.");
console.error("Order error:",error);
}
}

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

document.getElementById("search").addEventListener("input",renderFoods);
document.getElementById("category").addEventListener("change",renderFoods);
document.addEventListener("click",closeProfileMenu);
window.addEventListener("focus",initAuthNav);
window.addEventListener("storage",initAuthNav);

initAuthNav();
loadFoods();
try{
renderCart();
}
catch(error){
cart={};
saveCart();
renderCart();
console.error("Cart reset due to invalid cached data:",error);
}

</script>

</body>
</html>
