<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodie Orange Pro</title>

<style>
/* (UNCHANGED CSS — kept exactly same) */
:root{
--primary:#fc8019;
--primary-dark:#e56f12;
--bg1:#fff4e6;
--bg2:#ffe8cc;
--dark:#222;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,var(--bg1),var(--bg2));
}

header{
position:sticky;
top:0;
background:linear-gradient(to right,#fc8019,#ff9f43);
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
z-index:1000;
}

.logo{font-size:22px;font-weight:bold;}

.cart-icon{position:relative;cursor:pointer;font-size:22px;}

.nav-right{display:flex;align-items:center;gap:12px;}

.nav-btn{
background:#fff;color:#fc8019;border:none;
padding:6px 14px;border-radius:6px;
font-weight:600;cursor:pointer;
}

.profile-menu{position:relative;}
.profile-btn{
width:36px;height:36px;border-radius:50%;
border:none;background:#fff;color:#fc8019;
cursor:pointer;
}

.profile-dropdown{
display:none;position:absolute;right:0;top:44px;
background:#fff;border-radius:10px;
box-shadow:0 8px 24px rgba(0,0,0,0.16);
}

.profile-dropdown.show{display:block;}

.badge{
position:absolute;top:-8px;right:-10px;
background:#fff;color:#fc8019;
font-size:12px;padding:2px 6px;
border-radius:50%;
}

/* rest CSS unchanged... */
</style>
</head>

<body>

<header>
<div class="logo">Foodie Orange</div>

<div class="nav-right">

<button class="nav-btn" id="loginBtn" onclick="location.href='login.html'">Login</button>
<button class="nav-btn" id="signupBtn" onclick="location.href='signup.html'">Sign Up</button>

<!-- ✅ kept your feedback button -->
<a href="feedback.html">
  <button class="nav-btn">Feedback</button>
</a>

<div class="profile-menu" id="profileMenu" style="display:none;">
<button class="profile-btn" id="profileToggle" onclick="toggleProfileMenu(event)">👤</button>
<div class="profile-dropdown" id="profileDropdown">
<button onclick="location.href='profile.html'">View Profile</button>
<button onclick="location.href='my-receipts.html'">My Receipts</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<div class="cart-icon" onclick="toggleCart()">🛒
<span class="badge" id="count">0</span>
</div>

</div>
</header>

<div class="controls">
<input type="text" id="search" placeholder="Search food...">
<select id="category">
<option value="all">All Categories</option>
<option value="Indian">Indian</option>
<option value="Chinese">Chinese</option>
<option value="Italian">Italian</option>
<option value="FastFood">Fast Food</option>
<option value="Dessert">Dessert</option>
<option value="Beverage">Beverage</option>
</select>
</div>

<div class="container">
<div class="food-grid" id="food"></div>

<div class="cart" id="cart">
<h2>Billing Summary</h2>
<div id="cartItems"></div>
<div class="summary" id="summary"></div>

<!-- ✅ fixed button -->
<button class="place-btn" onclick="placeOrder()">Place Order</button>

</div>
</div>

<script>
const API_BASE="http://localhost:5000";
let foods=[];

/* CART */
let cart=JSON.parse(localStorage.getItem("cart"))||{};

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
}

/* ✅ kept wrapper function (important) */
function placeOrder(){
placeOrderAsync();
}

async function placeOrderAsync(){

if(Object.keys(cart).length===0){
alert("Your cart is empty!");
return;
}

try{
let response=await fetch(`${API_BASE}/api/orders`,{method:"POST"});
let result=await response.json();

localStorage.setItem("lastOrder",JSON.stringify(result));

alert("Order placed successfully!");

cart={};
saveCart();

window.location.href="receipt.html";
}
catch(error){
alert("Unable to place order.");
}
}

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}
</script>

</body>
</html>
