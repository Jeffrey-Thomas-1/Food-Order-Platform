<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Receipts</title>

<style>
body{font-family:Arial;background:#f5f5f5;}
.page-wrap{max-width:980px;margin:40px auto;padding:16px;}
.top-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.link-btn{background:#fff;color:#fc8019;border:1px solid #fc8019;padding:8px 12px;border-radius:8px;cursor:pointer;}
.receipt-list{display:grid;gap:14px;}
.receipt-card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 8px 20px rgba(0,0,0,0.1);position:relative;}
.meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px;margin-bottom:10px;}
.item-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed #eee;}
.stamp{position:absolute;top:10px;right:10px;transform:rotate(-15deg);font-weight:bold;padding:4px 10px;border-radius:6px;}
.stamp.paid{border:2px solid green;color:green;}
.empty{text-align:center;padding:20px;background:#fff;border-radius:10px;}
</style>
</head>

<body>

<div class="page-wrap">

<div class="top-actions">
<h2 style="color:#fc8019;">My Receipts</h2>
<button class="link-btn" onclick="location.href='index.html'">Back</button>
</div>

<div id="receiptsContainer" class="receipt-list"></div>

</div>

<script>

// FORMAT MONEY
function formatMoney(value){
return `₹${Number(value||0).toFixed(2)}`;
}

// ITEMS HTML
function buildItemsHtml(items){
return items.map(item=>{
const total=item.qty*item.price;
return `<div class="item-row">
<span>${item.name} x${item.qty}</span>
<span>${formatMoney(total)}</span>
</div>`;
}).join("");
}

// RENDER RECEIPTS
function renderReceipts(receipts){
const container=document.getElementById("receiptsContainer");

if(!receipts.length){
container.innerHTML="<div class='empty'>No receipts found</div>";
return;
}

container.innerHTML=receipts.map(r=>{

// ✅ NO DISCOUNT TOTAL
const total = r.subtotal + r.delivery + r.tax;

return `
<div class="receipt-card">

<div class="stamp paid">PAID</div>

<div class="meta">
<div><b>Receipt:</b> ${r.receipt_number}</div>
<div><b>Order:</b> ${r.order_id}</div>
<div><b>Date:</b> ${r.created_at}</div>
</div>

<div class="meta">
<div><b>Name:</b> ${r.customer_name}</div>
<div><b>Phone:</b> ${r.customer_phone}</div>
</div>

<b>Items</b>
${buildItemsHtml(r.items)}

<div style="margin-top:10px;">
<div>Subtotal: ${formatMoney(r.subtotal)}</div>
<div>Delivery: ${formatMoney(r.delivery)}</div>
<div>Tax: ${formatMoney(r.tax)}</div>

<!-- ✅ FINAL TOTAL -->
<div><b>Total: ${formatMoney(total)}</b></div>

</div>

</div>
`;
}).join("");
}

// 🚀 DUMMY DATA (so page always works)
const dummyData = [
{
receipt_number:"R001",
order_id:101,
created_at:"2026-04-27",
customer_name:"Appu",
customer_phone:"9876543210",
subtotal:500,
delivery:50,
tax:25,
items:[
{name:"Burger",qty:2,price:100},
{name:"Pizza",qty:1,price:300}
]
}
];

// TRY FETCH (OPTIONAL)
async function loadData(){
try{
const res = await fetch("http://localhost:5000/api/receipts/my");
const data = await res.json();

renderReceipts(data.receipts || dummyData);
}
catch{
renderReceipts(dummyData); // fallback
}
}

loadData();

</script>

</body>
</html>
